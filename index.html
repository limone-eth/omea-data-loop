<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Omea — Data Loop Canvas</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0d1a;
    --panel: #161a30;
    --panel-hover: #1c2044;
    --line: rgba(42, 47, 85, 0.6);
    --ink: #e8eaf5;
    --ink-mid: #c4c8e0;
    --ink-dim: #8b91b8;
    --accent: #7c9cff;
    --green: #3ecf8e;
    --amber: #f5b454;
    --red: #ef6b6b;
    --violet: #b18bff;
    --teal: #4ed3d1;
    --pink: #f48fb1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* ── Toolbar ── */
  .toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: rgba(10, 13, 26, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    z-index: 100;
  }
  .toolbar h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink);
    white-space: nowrap;
  }
  .toolbar .sep {
    width: 1px;
    height: 20px;
    background: var(--line);
  }
  .toolbar .hint {
    font-size: 11px;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .toolbar .spacer { flex: 1; }
  .toolbar button {
    background: rgba(124, 156, 255, 0.1);
    border: 1px solid rgba(124, 156, 255, 0.2);
    color: var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .toolbar button:hover {
    background: rgba(124, 156, 255, 0.2);
    border-color: rgba(124, 156, 255, 0.4);
  }
  .toolbar .zoom-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    min-width: 48px;
    text-align: center;
  }

  /* ── Canvas ── */
  .canvas-wrap {
    position: fixed;
    top: 48px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }
  .canvas-wrap.grabbing { cursor: grabbing; }
  .canvas-wrap.dragging-node { cursor: grabbing; }

  .canvas {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* Dot grid on canvas */
  .grid-bg {
    position: absolute;
    top: -5000px; left: -5000px;
    width: 15000px; height: 15000px;
    background:
      radial-gradient(circle at 1px 1px, rgba(124, 156, 255, 0.06) 1px, transparent 0);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── SVG arrows layer ── */
  .arrows-layer {
    position: absolute;
    top: -5000px; left: -5000px;
    width: 15000px; height: 15000px;
    pointer-events: none;
    overflow: visible;
  }

  /* ── Row labels ── */
  .row-label {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink-dim);
    font-weight: 600;
    text-transform: uppercase;
    white-space: nowrap;
    opacity: 0.7;
    cursor: pointer;
    z-index: 3;
    padding: 4px 10px;
    border-radius: 6px;
    transition: opacity 0.2s ease, background 0.2s ease;
  }
  .row-label:hover {
    opacity: 1;
    background: rgba(124, 156, 255, 0.08);
  }

  /* ── Row backgrounds ── */
  .row-bg {
    position: absolute;
    background: rgba(22, 26, 48, 0.35);
    border: 1px solid rgba(42, 47, 85, 0.25);
    border-radius: 16px;
    cursor: pointer;
    z-index: 0;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .row-bg:hover {
    border-color: rgba(124, 156, 255, 0.3);
    background: rgba(22, 26, 48, 0.5);
  }

  /* ── Row info panel ── */
  .row-info-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }
  .row-info-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .row-info-panel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    max-width: 640px;
    width: calc(100% - 48px);
    max-height: calc(100vh - 120px);
    overflow-y: auto;
    background: linear-gradient(180deg, #161a30 0%, #111428 100%);
    border: 1px solid rgba(124, 156, 255, 0.25);
    border-radius: 16px;
    padding: 32px 36px 28px;
    z-index: 201;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
  }
  .row-info-panel.open {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
  }
  .row-info-panel .panel-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .row-info-panel h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
    padding: 0;
    color: var(--ink);
  }
  .row-info-panel h2::before { display: none; }
  .row-info-panel .panel-sub {
    font-size: 14px;
    color: var(--ink-dim);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .row-info-panel h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-mid);
    margin: 18px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'JetBrains Mono', monospace;
  }
  .row-info-panel ul {
    margin: 0;
    padding-left: 18px;
    color: var(--ink-dim);
    font-size: 13px;
    line-height: 1.7;
  }
  .row-info-panel li {
    margin-bottom: 4px;
  }
  .row-info-panel li strong {
    color: var(--ink-mid);
  }
  .row-info-panel .flow-step {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0;
    font-size: 13px;
    color: var(--ink-dim);
  }
  .row-info-panel .flow-arrow {
    color: var(--accent);
    font-size: 14px;
    flex-shrink: 0;
  }
  .row-info-panel .flow-node {
    background: rgba(124, 156, 255, 0.08);
    border: 1px solid rgba(124, 156, 255, 0.15);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mid);
    white-space: nowrap;
  }
  .row-info-panel .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(124, 156, 255, 0.06);
    color: var(--ink-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, color 0.15s ease;
    line-height: 1;
  }
  .row-info-panel .close-btn:hover {
    background: rgba(124, 156, 255, 0.15);
    color: var(--ink);
  }

  /* ── Nodes ── */
  .node {
    position: absolute;
    background: #1a1e38;
    border-radius: 12px;
    border: 1.3px solid var(--line);
    padding: 14px 16px;
    cursor: grab;
    transition: box-shadow 0.2s ease, border-color 0.2s ease;
    z-index: 2;
  }
  .node:hover {
    z-index: 10;
    border-color: rgba(124, 156, 255, 0.4);
    box-shadow:
      0 0 0 1px rgba(124, 156, 255, 0.1),
      0 8px 32px rgba(0, 0, 0, 0.4);
  }
  .node.dragging {
    cursor: grabbing;
    z-index: 50;
    box-shadow:
      0 0 0 2px rgba(124, 156, 255, 0.3),
      0 16px 48px rgba(0, 0, 0, 0.5);
    transition: none;
  }
  .node.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(124, 156, 255, 0.2);
  }

  .node .node-title {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
    white-space: nowrap;
  }
  .node .node-lines {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .node .node-line {
    font-size: 11px;
    color: var(--ink-dim);
    white-space: nowrap;
  }
  .node .node-sep {
    height: 1px;
    background: var(--line);
    margin: 6px 0;
  }
  .node .node-footer {
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .node .node-subfooter {
    font-size: 10px;
    color: var(--ink-dim);
    white-space: nowrap;
  }

  /* ── Minimap ── */
  .minimap {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 200px;
    height: 140px;
    background: rgba(10, 13, 26, 0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    z-index: 90;
    cursor: pointer;
  }
  .minimap-canvas {
    width: 100%;
    height: 100%;
  }
  .minimap-viewport {
    position: absolute;
    border: 1.5px solid var(--accent);
    border-radius: 2px;
    background: rgba(124, 156, 255, 0.06);
    pointer-events: none;
  }

  /* ── Client (user-facing) nodes ── */
  .node.client {
    background: linear-gradient(135deg, #1a1e38 0%, #1e2348 100%);
    border-width: 2px;
    box-shadow:
      0 0 20px rgba(124, 156, 255, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }
  .node.client::after {
    content: 'USER-FACING';
    position: absolute;
    top: -10px;
    right: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #0a0d1a;
    background: linear-gradient(135deg, var(--accent), var(--violet));
    padding: 2px 8px;
    border-radius: 4px;
    line-height: 1.4;
  }
  .node.client:hover {
    box-shadow:
      0 0 0 2px rgba(124, 156, 255, 0.2),
      0 0 32px rgba(124, 156, 255, 0.12),
      0 12px 40px rgba(0, 0, 0, 0.4);
  }

  /* ── Focus / highlight mode ── */
  .canvas.has-focus .node {
    opacity: 0.15;
    transition: opacity 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .canvas.has-focus .node.highlighted {
    opacity: 1;
    z-index: 10;
    box-shadow:
      0 0 0 2px rgba(124, 156, 255, 0.25),
      0 0 24px rgba(124, 156, 255, 0.1),
      0 8px 32px rgba(0, 0, 0, 0.35);
  }
  .canvas.has-focus .node.focus-origin {
    opacity: 1;
    z-index: 11;
    box-shadow:
      0 0 0 2.5px var(--accent),
      0 0 32px rgba(124, 156, 255, 0.18),
      0 12px 40px rgba(0, 0, 0, 0.4);
  }
  .canvas.has-focus .arrows-layer path {
    opacity: 0.06;
    transition: opacity 0.25s ease;
  }
  .canvas.has-focus .arrows-layer path.arrow-highlighted {
    opacity: 1;
    stroke-width: 2.5;
  }
  .canvas.has-focus .arrows-layer text,
  .canvas.has-focus .arrows-layer rect[data-from] {
    opacity: 0.06;
    transition: opacity 0.25s ease;
  }
  .canvas.has-focus .arrows-layer text.label-highlighted,
  .canvas.has-focus .arrows-layer rect.label-highlighted {
    opacity: 1;
  }

  /* ── Selection box ── */
  .selection-box {
    position: absolute;
    border: 1px solid var(--accent);
    background: rgba(124, 156, 255, 0.06);
    border-radius: 2px;
    pointer-events: none;
    z-index: 60;
    display: none;
  }

  @media (prefers-reduced-motion: reduce) {
    .node { transition: none; }
    .toolbar button { transition: none; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>Omea — Data Loop Canvas</h1>
  <div class="sep"></div>
  <span class="hint">Drag nodes &middot; Scroll or double-click to zoom &middot; Space+drag to pan &middot; Click to highlight</span>
  <div class="spacer"></div>
  <button onclick="resetLayout()">Reset layout</button>
  <button onclick="fitToScreen()">Fit to screen</button>
  <div class="sep"></div>
  <button onclick="zoomBy(-0.15)" title="Zoom out" style="min-width:32px;padding:5px 8px;font-size:16px;line-height:1;">&minus;</button>
  <span class="zoom-display" id="zoomDisplay">100%</span>
  <button onclick="zoomBy(0.15)" title="Zoom in" style="min-width:32px;padding:5px 8px;font-size:16px;line-height:1;">+</button>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <div class="canvas" id="canvas">
    <div class="grid-bg"></div>
    <svg class="arrows-layer" id="arrowsLayer" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ah-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

        </marker>
        <marker id="ah-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 1 L 8 5 L 0 9 z" fill="#3ecf8e"/>
        </marker>
        <marker id="ah-violet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

        <marker id="ah-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

        <marker id="ah-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

        </marker>
        <marker id="ah-pink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 1 L 8 5 L 0 9 z" fill="#f48fb1"/>
        </marker>
        <marker id="ah-dim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 1 L 8 5 L 0 9 z" fill="#8b91b8"/>
        </marker>
      </defs>
    </svg>
    <div class="selection-box" id="selectionBox"></div>
  </div>
</div>

<div class="row-info-overlay" id="rowInfoOverlay"></div>
<div class="row-info-panel" id="rowInfoPanel">
  <button class="close-btn" id="rowInfoClose">&times;</button>
  <div id="rowInfoContent"></div>
</div>

<div class="minimap" id="minimap">
  <canvas class="minimap-canvas" id="minimapCanvas" width="400" height="280"></canvas>
  <div class="minimap-viewport" id="minimapViewport"></div>
</div>

  if (node.stepLabel) {
    html += '<div style="font-family:\'JetBrains Mono\',monospace;font-size:10px;font-weight:600;color:' + node.color + ';margin-bottom:4px;">' + node.stepLabel + '</div>';
  }
  html += '<div class="node-title">' + node.title + '</div>';
  if (node.storage) {
    html += '<div style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:#8b91b8;margin:-2px 0 4px;opacity:0.8;">' + node.storage + '</div>';
  }
  html += '<div class="node-lines">';
  node.lines.forEach(l => { html += '<div class="node-line">' + l + '</div>'; });
  html += '</div>';
  html += '<div class="node-sep"></div>';
  html += '<div class="node-footer" style="color:' + node.color + '">' + node.footer + '</div>';
  if (node.subfooter) {

// Find the point where a ray from the center of a rect toward a target
// point intersects the rect's border. This guarantees the anchor is
// exactly on the box edge regardless of angle.
function rectBorderPoint(rect, targetX, targetY) {
  const cx = rect.x + rect.w / 2;
  const cy = rect.y + rect.h / 2;
  const hw = rect.w / 2;
  const hh = rect.h / 2;

  let dx = targetX - cx;
  let dy = targetY - cy;

  // Avoid division by zero for overlapping centers
  if (dx === 0 && dy === 0) return { x: cx, y: cy + hh };

  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);

  // Which edge does the ray hit first?
  // Scale factor to reach each edge:
  //   horizontal edges: hh / |dy|   vertical edges: hw / |dx|
  let scale;
  if (absDx * hh > absDy * hw) {
    // Hits left or right edge first
    scale = hw / absDx;
  } else {
    // Hits top or bottom edge first
    scale = hh / absDy;
  }

  return { x: cx + dx * scale, y: cy + dy * scale };
}

function getAnchor(fromId, toId, conn) {
  const f = nodeMap[fromId];
  const t = nodeMap[toId];
  const fRect = { x: f.x, y: f.y, w: f.w, h: f.h };
  const tRect = { x: t.x, y: t.y, w: t.w, h: t.h };
  const fc = { x: f.x + f.w / 2, y: f.y + f.h / 2 };
  const tc = { x: t.x + t.w / 2, y: t.y + t.h / 2 };

  // For feedback loops, use specific edge anchors so curves look clean
  if (conn && conn.feedback) {
    const dx = tc.x - fc.x;
    const dy = tc.y - fc.y;
    if (Math.abs(dy) > Math.abs(dx)) {
      // Vertical feedback (going up) — exit bottom of source, enter top of target
      if (dy < 0) {
        return { fx: fc.x, fy: f.y + f.h, tx: tc.x, ty: t.y };
      }
      // Going down — exit bottom, enter top
      return { fx: fc.x, fy: f.y + f.h, tx: tc.x, ty: t.y };
    }
    // Horizontal-ish — exit right of higher, enter right of lower (or vice versa)
    if (dy < 0) {
      return { fx: fc.x, fy: f.y + f.h, tx: tc.x, ty: t.y };
    }
    return { fx: f.x + f.w, fy: fc.y, tx: t.x + t.w, ty: tc.y };
  }

  // Normal connections: ray-cast from each center toward the other
  const fromPt = rectBorderPoint(fRect, tc.x, tc.y);
  const toPt   = rectBorderPoint(tRect, fc.x, fc.y);

  return { fx: fromPt.x, fy: fromPt.y, tx: toPt.x, ty: toPt.y };
}

function drawArrows() {
  // Clear existing paths (keep defs)
  const defs = arrowsLayer.querySelector('defs');
  arrowsLayer.innerHTML = '';
  arrowsLayer.appendChild(defs);

  const svgOffset = 5000; // matches top/left offset

  CONNECTIONS.forEach(conn => {
    const { fx, fy, tx, ty } = getAnchor(conn.from, conn.to, conn);

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');

    const dx = tx - fx;
    const dy = ty - fy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Determine dominant direction from the exit/entry points
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    const isVertical = absDy >= absDx;

    let d;
    if (conn.feedback) {
      // Feedback loops: wide sweeping curves
      if (isVertical && dy < 0) {
        // Going UP (e.g. daily→checkins, retest→randox)
        const bulge = Math.max(80, absDx * 0.6);
        const side = fx <= tx ? -bulge : bulge;
        d = `M ${fx + svgOffset} ${fy + svgOffset} C ${fx + side + svgOffset} ${fy + absDy * 0.35 + svgOffset}, ${tx + side + svgOffset} ${ty - absDy * 0.35 + svgOffset}, ${tx + svgOffset} ${ty + svgOffset}`;
      } else if (isVertical && dy > 0) {
        // Going DOWN feedback
        const bulge = Math.max(80, absDx * 0.6);
        const side = fx <= tx ? bulge : -bulge;
        d = `M ${fx + svgOffset} ${fy + svgOffset} C ${fx + side + svgOffset} ${fy + absDy * 0.35 + svgOffset}, ${tx + side + svgOffset} ${ty - absDy * 0.35 + svgOffset}, ${tx + svgOffset} ${ty + svgOffset}`;
      } else {
        // Horizontal-ish feedback
        const bulge = Math.max(100, absDy * 0.8);
        d = `M ${fx + svgOffset} ${fy + svgOffset} C ${fx + svgOffset} ${fy + bulge + svgOffset}, ${tx + svgOffset} ${ty + bulge + svgOffset}, ${tx + svgOffset} ${ty + svgOffset}`;
      }
    } else if (isVertical) {
      // Vertical dominant: S-curve with control points that keep tangent vertical at endpoints
      const tension = Math.min(absDy * 0.45, 120);
      const cyF = fy + (dy > 0 ? tension : -tension);
      const cyT = ty - (dy > 0 ? tension : -tension);
      d = `M ${fx + svgOffset} ${fy + svgOffset} C ${fx + svgOffset} ${cyF + svgOffset}, ${tx + svgOffset} ${cyT + svgOffset}, ${tx + svgOffset} ${ty + svgOffset}`;
    } else {
      // Horizontal dominant: S-curve with control points that keep tangent horizontal at endpoints
      const tension = Math.min(absDx * 0.45, 100);
      const cxF = fx + (dx > 0 ? tension : -tension);
      const cxT = tx - (dx > 0 ? tension : -tension);
      d = `M ${fx + svgOffset} ${fy + svgOffset} C ${cxF + svgOffset} ${fy + svgOffset}, ${cxT + svgOffset} ${ty + svgOffset}, ${tx + svgOffset} ${ty + svgOffset}`;
    }

    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', conn.color);
    path.setAttribute('stroke-width', conn.feedback ? '2.2' : '1.5');
    path.setAttribute('marker-end', 'url(#' + conn.marker + ')');
    if (conn.dashed) path.setAttribute('stroke-dasharray', conn.feedback ? '8 5' : '5 3');
    if (conn.opacity) path.setAttribute('opacity', conn.opacity);
    path.dataset.from = conn.from;
    path.dataset.to = conn.to;

    arrowsLayer.appendChild(path);

    // Label for feedback loops — rendered as pill with background
    if (conn.label) {
      // Sample the actual bezier midpoint (t=0.5) from the path
      const tempLen = path.getTotalLength();
      const midPt = path.getPointAtLength(tempLen * 0.5);
      // Offset the label away from the curve so it doesn't overlap
      let offsetX = 0, offsetY = -14;
      if (isVertical && conn.feedback) {
        // For vertical feedback curves, offset to the side the curve bulges toward
        offsetX = fx <= tx ? -10 : 10;
        offsetY = 0;
      }
      const labelX = midPt.x + offsetX;
      const labelY = midPt.y + offsetY;

      // Measure text width to size the pill
      const textLen = conn.label.length * 6.2 + 16;
      const pillH = 18;

      // Background pill
      const pill = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      pill.setAttribute('x', labelX - textLen / 2);
      pill.setAttribute('y', labelY - pillH / 2 - 1);
      pill.setAttribute('width', textLen);
      pill.setAttribute('height', pillH);
      pill.setAttribute('rx', 5);
      pill.setAttribute('fill', '#0e1125');
      pill.setAttribute('stroke', conn.color);
      pill.setAttribute('stroke-width', '0.8');
      pill.setAttribute('opacity', '0.92');
      pill.dataset.from = conn.from;
      pill.dataset.to = conn.to;
      arrowsLayer.appendChild(pill);

      // Text on top
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', labelX);
      text.setAttribute('y', labelY + 3.5);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('fill', conn.color);
      text.setAttribute('font-family', "'JetBrains Mono', monospace");
      text.setAttribute('font-size', '9');
      text.setAttribute('font-weight', '600');
      text.setAttribute('letter-spacing', '0.04em');
      text.dataset.from = conn.from;
      text.dataset.to = conn.to;
      text.textContent = conn.label;
      arrowsLayer.appendChild(text);
    }
  });

  // Re-apply focus highlighting after redraw (SVG was cleared)
  if (focusedNodeId) {
    const { conns: connectedConns } = getConnectedNodes(focusedNodeId);
    const paths = arrowsLayer.querySelectorAll('path[data-from]');
    paths.forEach(p => {
      if (connectedConns.some(c => c.from === p.dataset.from && c.to === p.dataset.to)) {
        p.classList.add('arrow-highlighted');
      }
    });
    arrowsLayer.querySelectorAll('text[data-from], rect[data-from]').forEach(el => {
      if (connectedConns.some(c => c.from === el.dataset.from && c.to === el.dataset.to)) {
        el.classList.add('label-highlighted');
      }
    });
  }
}

drawArrows();

// ═══════════════════════════════════════════
// PAN & ZOOM
// ═══════════════════════════════════════════

function applyTransform() {
  canvas.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
  zoomDisplay.textContent = Math.round(zoom * 100) + '%';
  updateMinimap();
}

// Zoom toward the center of the viewport by a delta amount
function zoomBy(delta) {
  const rect = canvasWrap.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  zoomToward(cx, cy, delta);
}

// Zoom toward a specific screen point
function zoomToward(sx, sy, delta) {
  const oldZoom = zoom;
  zoom = Math.max(0.15, Math.min(3, zoom + delta));
  pan.x = sx - (sx - pan.x) * (zoom / oldZoom);
  pan.y = sy - (sy - pan.y) * (zoom / oldZoom);
  applyTransform();
}

// Double-click to zoom in (shift+double-click to zoom out)
canvasWrap.addEventListener('dblclick', e => {
  e.preventDefault();
  const rect = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.shiftKey ? -0.3 : 0.3;
  zoomToward(mx, my, delta);
});

canvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const oldZoom = zoom;
  const delta = -e.deltaY * 0.001;
  zoom = Math.max(0.15, Math.min(3, zoom * (1 + delta)));

  // Zoom toward mouse
  pan.x = mx - (mx - pan.x) * (zoom / oldZoom);
  pan.y = my - (my - pan.y) * (zoom / oldZoom);

  applyTransform();
}, { passive: false });

canvasWrap.addEventListener('pointerdown', e => {
  if (e.target.closest('.node')) return;
  if (e.button === 1 || spaceHeld || e.button === 0) {
    if (e.target.closest('.node')) return;
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY };
    panOrigin = { ...pan };
    canvasWrap.classList.add('grabbing');
    e.preventDefault();
  }
});

window.addEventListener('pointermove', e => {
  if (isPanning) {
    pan.x = panOrigin.x + (e.clientX - panStart.x);
    pan.y = panOrigin.y + (e.clientY - panStart.y);
    applyTransform();
  }
  if (dragNode) {
    // Check if we've moved enough to count as a drag (not a click)
    if (dragStartPos) {
      const movedX = Math.abs(e.clientX - dragStartPos.x);
      const movedY = Math.abs(e.clientY - dragStartPos.y);
      if (movedX > 4 || movedY > 4) didDrag = true;
    }
    const n = nodeMap[dragNode];
    const newX = (e.clientX - canvasWrap.getBoundingClientRect().left - pan.x) / zoom - dragOffset.x;
    const newY = (e.clientY - canvasWrap.getBoundingClientRect().top - pan.y) / zoom - dragOffset.y;

    // Snap to grid (40px)
    n.x = Math.round(newX / 20) * 20;
    n.y = Math.round(newY / 20) * 20;

    const el = nodeElements[dragNode];
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    syncNodeSizes();
    drawArrows();
    updateMinimap();
  }
});

window.addEventListener('pointerup', e => {
  if (isPanning) {
    isPanning = false;
    canvasWrap.classList.remove('grabbing');
  }
  if (dragNode) {
    const clickedId = dragNode;
    nodeElements[dragNode].classList.remove('dragging');
    canvasWrap.classList.remove('dragging-node');
    dragNode = null;

    // If it was a click (no drag), toggle focus highlight
    if (!didDrag) {
      if (focusedNodeId === clickedId) {
        clearFocus();
      } else {
        setFocus(clickedId);
      }
    }
    dragStartPos = null;
  }
});

// Space key for pan mode
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.target.matches('input,textarea')) {
    spaceHeld = true;
    canvasWrap.style.cursor = 'grab';
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    spaceHeld = false;
    canvasWrap.style.cursor = '';
  }
});

// ═══════════════════════════════════════════
// NODE DRAG
// ═══════════════════════════════════════════

canvas.addEventListener('pointerdown', e => {
  const nodeEl = e.target.closest('.node');
  if (!nodeEl || spaceHeld) return;

  e.stopPropagation();
  const id = nodeEl.dataset.id;
  const n = nodeMap[id];
  const rect = canvasWrap.getBoundingClientRect();

  dragNode = id;
  dragStartPos = { x: e.clientX, y: e.clientY };
  didDrag = false;
  dragOffset = {
    x: (e.clientX - rect.left - pan.x) / zoom - n.x,
    y: (e.clientY - rect.top - pan.y) / zoom - n.y,
  };

  nodeEl.classList.add('dragging');
  canvasWrap.classList.add('dragging-node');
});

// ═══════════════════════════════════════════
// FOCUS / HIGHLIGHT
// ═══════════════════════════════════════════

function getConnectedNodes(nodeId) {
  const connected = new Set();
  const connectedConns = [];
  CONNECTIONS.forEach(conn => {
    if (conn.from === nodeId) {
      connected.add(conn.to);
      connectedConns.push(conn);
    }
    if (conn.to === nodeId) {
      connected.add(conn.from);
      connectedConns.push(conn);
    }
  });
  return { nodes: connected, conns: connectedConns };
}

function setFocus(nodeId) {
  focusedNodeId = nodeId;
  const { nodes: connectedIds, conns: connectedConns } = getConnectedNodes(nodeId);

  canvas.classList.add('has-focus');

  // Highlight origin node
  Object.keys(nodeElements).forEach(id => {
    const el = nodeElements[id];
    el.classList.remove('focus-origin', 'highlighted');
    if (id === nodeId) {
      el.classList.add('focus-origin');
    } else if (connectedIds.has(id)) {
      el.classList.add('highlighted');
    }
  });

  // Highlight connected arrows
  const paths = arrowsLayer.querySelectorAll('path[data-from]');
  paths.forEach(p => {
    const isConn = connectedConns.some(c => c.from === p.dataset.from && c.to === p.dataset.to);
    if (isConn) {
      p.classList.add('arrow-highlighted');
    } else {
      p.classList.remove('arrow-highlighted');
    }
  });

  // Highlight connected labels + pill backgrounds
  arrowsLayer.querySelectorAll('text[data-from], rect[data-from]').forEach(el => {
    const isConn = connectedConns.some(c => c.from === el.dataset.from && c.to === el.dataset.to);
    if (isConn) {
      el.classList.add('label-highlighted');
    } else {
      el.classList.remove('label-highlighted');
    }
  });
}

function clearFocus() {
  focusedNodeId = null;
  canvas.classList.remove('has-focus');
  Object.keys(nodeElements).forEach(id => {
    nodeElements[id].classList.remove('focus-origin', 'highlighted');
  });
  arrowsLayer.querySelectorAll('.arrow-highlighted').forEach(p => p.classList.remove('arrow-highlighted'));
  arrowsLayer.querySelectorAll('.label-highlighted').forEach(t => t.classList.remove('label-highlighted'));
}

// Click empty canvas to clear focus
canvasWrap.addEventListener('pointerup', e => {
  if (!e.target.closest('.node') && !didDrag && !isPanning) {
    clearFocus();
  }
}, true);

// Escape key clears focus
window.addEventListener('keydown', e => {
  if (e.code === 'Escape' && focusedNodeId) {
    clearFocus();
  }
});

// ═══════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════

const minimapCanvas = document.getElementById('minimapCanvas');
const minimapCtx = minimapCanvas.getContext('2d');
const minimapViewport = document.getElementById('minimapViewport');

function getContentBounds() {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  NODES.forEach(n => {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + n.w);
    maxY = Math.max(maxY, n.y + n.h);
  });
  const pad = 60;
  return { x: minX - pad, y: minY - pad, w: maxX - minX + pad * 2, h: maxY - minY + pad * 2 };
}

function updateMinimap() {
  const bounds = getContentBounds();
  const cw = minimapCanvas.width;
  const ch = minimapCanvas.height;
  const scale = Math.min(cw / bounds.w, ch / bounds.h);

  minimapCtx.clearRect(0, 0, cw, ch);
  minimapCtx.fillStyle = 'rgba(10, 13, 26, 0.95)';
  minimapCtx.fillRect(0, 0, cw, ch);

  // Draw nodes
  NODES.forEach(n => {
    const rx = (n.x - bounds.x) * scale;
    const ry = (n.y - bounds.y) * scale;
    const rw = n.w * scale;
    const rh = n.h * scale;
    minimapCtx.fillStyle = n.color + '40';
    minimapCtx.strokeStyle = n.color + '80';
    minimapCtx.lineWidth = 0.5;
    minimapCtx.beginPath();
    minimapCtx.roundRect(rx, ry, rw, rh, 2);
    minimapCtx.fill();
    minimapCtx.stroke();
  });

  // Viewport indicator
  const wrapRect = canvasWrap.getBoundingClientRect();
  const vpX = (-pan.x / zoom - bounds.x) * scale;
  const vpY = (-pan.y / zoom - bounds.y) * scale;
  const vpW = (wrapRect.width / zoom) * scale;
  const vpH = (wrapRect.height / zoom) * scale;

  minimapViewport.style.left = vpX + 'px';
  minimapViewport.style.top = vpY + 'px';
  minimapViewport.style.width = vpW + 'px';
  minimapViewport.style.height = vpH + 'px';
}

// Click minimap to navigate
document.getElementById('minimap').addEventListener('click', e => {
  const rect = minimapCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const bounds = getContentBounds();
  const cw = minimapCanvas.width;
  const ch = minimapCanvas.height;
  const scale = Math.min(cw / bounds.w, ch / bounds.h);
  const wrapRect = canvasWrap.getBoundingClientRect();

  const targetX = (mx / scale + bounds.x);
  const targetY = (my / scale + bounds.y);

  pan.x = -targetX * zoom + wrapRect.width / 2;
  pan.y = -targetY * zoom + wrapRect.height / 2;
  applyTransform();
});

// ═══════════════════════════════════════════
// TOOLBAR ACTIONS
// ═══════════════════════════════════════════

function resetLayout() {
  NODES.forEach(n => {
    n.x = originalPositions[n.id].x;
    n.y = originalPositions[n.id].y;
    nodeElements[n.id].style.left = n.x + 'px';
    nodeElements[n.id].style.top = n.y + 'px';
  });
  drawArrows();
  fitToScreen();
}

function fitToScreen() {
  const bounds = getContentBounds();
  const wrapRect = canvasWrap.getBoundingClientRect();
  const scaleX = wrapRect.width / bounds.w;
  const scaleY = wrapRect.height / bounds.h;
  zoom = Math.min(scaleX, scaleY) * 0.9;
  zoom = Math.max(0.15, Math.min(3, zoom));

  pan.x = (wrapRect.width - bounds.w * zoom) / 2 - bounds.x * zoom;
  pan.y = (wrapRect.height - bounds.h * zoom) / 2 - bounds.y * zoom;
  applyTransform();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════

fitToScreen();
</script>
</body>
</html>
